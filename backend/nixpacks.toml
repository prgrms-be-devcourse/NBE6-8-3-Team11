[phases.setup]
nixPkgs = ["openjdk21"]

[phases.build]
dependsOn = ["setup"]
cmds = ["chmod +x gradlew", "./gradlew clean build -x test --no-daemon"]

[phases.install]
dependsOn = ["build"]
cmds = ["echo 'PostgreSQL driver installation check'", "find . -name 'postgresql*.jar'"]

[start]
cmd = "java -Dspring.profiles.active=railway -cp 'build/libs/*:build/libs/postgresql-*.jar' org.springframework.boot.loader.launch.JarLauncher"
