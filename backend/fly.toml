# 빠른 배포를 위한 단순화된 설정
app = 'nbe6-8-3-team11'
primary_region = 'nrt'

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[env]
  SPRING_PROFILES_ACTIVE = "fly"
  PORT = "8080"

[checks]
  [checks.health]
    type = "http"
    port = 8080
    method = "get"
    path = "/actuator/health"
    timeout = "10s"
    interval = "30s"  
    grace_period = "15s"
