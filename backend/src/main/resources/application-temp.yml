spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/dolbomz?serverTimezone=Asia/Seoul&useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: dolbomz

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true       # 실행되는 SQL 로그 출력
    properties:
      hibernate:
        format_sql: true
    generate-ddl: true
    database-platform: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      mode: never

  # Redis 설정
  data:
    redis:
      host: localhost
      port: 6379
      password: # Redis 비밀번호가 설정되어 있다면 여기에 입력
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms