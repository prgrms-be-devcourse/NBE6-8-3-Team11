server:
  port: ${PORT:8080}
  address: 0.0.0.0

spring:
  datasource:
    # Fly.io 내부 PostgreSQL 연결 방식
    url: jdbc:postgresql://nbe6-8-3-team11-db.flycast:5432/postgres?sslmode=disable
    username: postgres
    password: AI4EYSNes1vrxe2
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: false
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        highlight_sql: false

  # Redis 설정 - Fly.io 내부에서 localhost로 연결
  data:
    redis:
      host: localhost
      port: 6379
      password: ""
      timeout: 2000ms
      connect-timeout: 2000ms
      repositories:
        enabled: true
  redis:
    timeout: 2000ms

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: a55fbac2b1ec1017835ea67b2a584ad5
            scope: profile_nickname, profile_image, account_email
            client-name: Kakao
            authorization-grant-type: authorization_code
            redirect-uri: https://nbe6-8-3-team11.fly.dev/login/oauth2/code/kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: myVeryLongSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLongAndSecureEnoughForProductionUse123456789
  access-token-expiration: PT2H
  refresh-token-expiration: PT168H

cookie:
  secure: true

websocket:
  allowed-origins:
    - "https://nbe-6-8-3-team11.vercel.app"
    - "https://*.vercel.app"
    - "https://*.fly.dev"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      # Redis 헬스체크에서 제외 (연결 실패해도 OK)
      show-components: never

logging:
  level:
    root: INFO
    com.back: DEBUG
    org.springframework.web.socket: DEBUG
    org.springframework.messaging: DEBUG
    org.springframework.data.redis: WARN
