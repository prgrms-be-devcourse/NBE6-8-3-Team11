name: CD Release - Deploy to Fly.io

# 중복 릴리즈 배포 방지
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy-production:
    name: Deploy Production to Fly.io
    runs-on: ubuntu-latest
    if: github.repository == 'prgrms-be-devcourse/NBE6-8-3-Team11'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission to gradlew
        working-directory: ./backend
        run: chmod +x ./gradlew

      - name: Build Production (Skip Tests)
        working-directory: ./backend
        run: ./gradlew clean build -x test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: fly

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Production to Fly.io
        working-directory: ./backend
        run: flyctl deploy --remote-only --app nbe6-8-3-team11
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
