name: CD - Release Branch Deploy

# 릴리즈 브랜치 배포: release/* 브랜치에서 실행
on:
  push:
    branches:
      - 'release/*'  # release/v1.0, release/v1.1 등
  workflow_dispatch:
    inputs:
      release_branch:
        description: '릴리즈 브랜치 이름 (예: release/v1.0)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}/backend
  FRONTEND_IMAGE_NAME: ${{ github.repository }}/frontend

jobs:
  # 1. 릴리즈 정보 추출
  extract-release-info:
    name: Extract Release Information
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_name: ${{ steps.version.outputs.release_name }}
    steps:
      - name: Extract version from branch name
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCH_NAME="${{ github.event.inputs.release_branch }}"
          else
            BRANCH_NAME="${{ github.ref_name }}"
          fi
          
          # release/v1.0 -> v1.0
          VERSION=$(echo $BRANCH_NAME | sed 's/release\///')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_name=Release $VERSION" >> $GITHUB_OUTPUT
          
          echo "🏷️ 릴리즈 버전: $VERSION"

  # 2. 릴리즈 환경 검증
  validate-release:
    name: Validate Release Environment
    runs-on: ubuntu-latest
    needs: extract-release-info
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4

      - name: Validate release branch
        run: |
          echo "🔍 릴리즈 브랜치 검증 중..."
          
          # develop 브랜치와의 차이점 확인
          git fetch origin develop
          COMMITS_BEHIND=$(git rev-list --count HEAD..origin/develop)
          
          if [ $COMMITS_BEHIND -gt 0 ]; then
            echo "⚠️ 경고: 이 릴리즈 브랜치는 develop보다 $COMMITS_BEHIND 커밋 뒤처져 있습니다."
            echo "💡 최신 develop 코드를 merge 하는 것을 고려해보세요."
          else
            echo "✅ 릴리즈 브랜치가 최신 상태입니다."
          fi

      - name: Check for release notes
        run: |
          # CHANGELOG.md 또는 릴리즈 노트 확인
          if [ -f "CHANGELOG.md" ]; then
            echo "✅ CHANGELOG.md 파일이 존재합니다."
          else
            echo "⚠️ CHANGELOG.md 파일이 없습니다. 릴리즈 노트 작성을 권장합니다."
          fi

  # 3. 백엔드 릴리즈 이미지 빌드
  build-backend-release:
    name: Build Backend Release Image
    runs-on: ubuntu-latest
    needs: [extract-release-info, validate-release]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run backend tests
        working-directory: ./backend
        run: |
          chmod +x gradlew
          ./gradlew test
          echo "✅ 백엔드 테스트 완료"

      - name: Build backend
        working-directory: ./backend
        run: |
          ./gradlew clean build
          echo "✅ 백엔드 빌드 완료"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.extract-release-info.outputs.version }}
            type=raw,value=release-latest
            type=sha,prefix=release-

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # 4. 프론트엔드 릴리즈 이미지 빌드
  build-frontend-release:
    name: Build Frontend Release Image
    runs-on: ubuntu-latest
    needs: [extract-release-info, validate-release]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies and test
        working-directory: ./frontend
        run: |
          npm ci
          npm run lint
          echo "✅ 프론트엔드 린트 검사 완료"

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm run build
          echo "✅ 프론트엔드 빌드 완료"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.extract-release-info.outputs.version }}
            type=raw,value=release-latest
            type=sha,prefix=release-

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # 5. 릴리즈 환경 배포
  deploy-release-environment:
    name: Deploy to Release Environment
    runs-on: ubuntu-latest
    needs: [extract-release-info, build-backend-release, build-frontend-release]
    environment: release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create release deployment files
        run: |
          mkdir -p release-deployment
          
          # 릴리즈 전용 docker-compose 파일 생성
          cat > release-deployment/docker-compose.release.yml << EOF
          version: '3.8'
          services:
            mysql:
              image: mysql:8.0
              container_name: petmatching-mysql-release
              restart: unless-stopped
              environment:
                MYSQL_ROOT_PASSWORD: release_root_2025
                MYSQL_DATABASE: petmatching_release
                MYSQL_USER: release_user
                MYSQL_PASSWORD: release_pass_2025
              ports:
                - "3308:3306"  # 릴리즈 전용 포트
              volumes:
                - mysql_release_data:/var/lib/mysql
                - ./mysql/init:/docker-entrypoint-initdb.d
              command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
              networks:
                - petmatching-release

            redis:
              image: redis:7-alpine
              container_name: petmatching-redis-release
              restart: unless-stopped
              ports:
                - "6381:6379"  # 릴리즈 전용 포트
              volumes:
                - redis_release_data:/data
              command: redis-server --appendonly yes
              networks:
                - petmatching-release

            backend:
              image: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ needs.extract-release-info.outputs.version }}
              container_name: petmatching-backend-release
              restart: unless-stopped
              environment:
                SPRING_PROFILES_ACTIVE: release
                MYSQL_HOST: mysql
                MYSQL_PORT: 3306
                MYSQL_DATABASE: petmatching_release
                MYSQL_USERNAME: release_user
                MYSQL_PASSWORD: release_pass_2025
                REDIS_HOST: redis
                REDIS_PORT: 6379
                JWT_SECRET: release_jwt_secret_for_final_testing
                KAKAO_CLIENT_ID: 27f36d6e010908844fbe8b200a8e25d8
                KAKAO_CLIENT_SECRET: release_secret
              ports:
                - "8082:8080"  # 릴리즈 전용 포트
              depends_on:
                - mysql
                - redis
              networks:
                - petmatching-release

            frontend:
              image: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ needs.extract-release-info.outputs.version }}
              container_name: petmatching-frontend-release
              restart: unless-stopped
              environment:
                NODE_ENV: production
                NEXT_PUBLIC_API_URL: http://localhost:8082
              ports:
                - "3002:3000"  # 릴리즈 전용 포트
              depends_on:
                - backend
              networks:
                - petmatching-release

          volumes:
            mysql_release_data:
            redis_release_data:

          networks:
            petmatching-release:
              driver: bridge
          EOF

          # 릴리즈 배포 스크립트 생성
          cat > release-deployment/deploy-release.sh << 'EOF'
          #!/bin/bash
          
          echo "🚀 PetMatching 릴리즈 환경 배포 시작..."
          echo "📦 버전: ${{ needs.extract-release-info.outputs.version }}"
          
          # 기존 릴리즈 환경 정리
          docker-compose -f docker-compose.release.yml down --remove-orphans
          
          # 릴리즈 이미지 pull
          docker-compose -f docker-compose.release.yml pull
          
          # 릴리즈 환경 시작
          docker-compose -f docker-compose.release.yml up -d
          
          # 헬스체크
          echo "⏳ 서비스 시작 대기..."
          sleep 45
          
          # 백엔드 헬스체크
          for i in {1..10}; do
            backend_health=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8082/actuator/health || echo "000")
            if [ "$backend_health" = "200" ]; then
              echo "✅ 백엔드 릴리즈 환경 정상"
              break
            else
              echo "⏳ 백엔드 대기 중... ($i/10)"
              sleep 10
            fi
          done
          
          # 프론트엔드 헬스체크
          for i in {1..10}; do
            frontend_health=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3002 || echo "000")
            if [ "$frontend_health" = "200" ]; then
              echo "✅ 프론트엔드 릴리즈 환경 정상"
              break
            else
              echo "⏳ 프론트엔드 대기 중... ($i/10)"
              sleep 10
            fi
          done
          
          echo ""
          echo "🎉 릴리즈 환경 배포 완료!"
          echo ""
          echo "🔗 릴리즈 테스트 URL:"
          echo "- Frontend: http://localhost:3002"
          echo "- Backend: http://localhost:8082"
          echo "- API Docs: http://localhost:8082/swagger-ui.html"
          echo "- Health Check: http://localhost:8082/actuator/health"
          echo ""
          echo "📋 테스트 완료 후 다음 단계:"
          echo "1. 모든 기능이 정상 동작하는지 확인"
          echo "2. 팀원들과 함께 최종 검토"
          echo "3. 문제없으면 main 브랜치로 머지"
          echo "4. 문제있으면 릴리즈 브랜치에서 수정 후 재배포"
          EOF

          chmod +x release-deployment/deploy-release.sh

      - name: Upload release deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-deployment-${{ needs.extract-release-info.outputs.version }}
          path: release-deployment/
          retention-days: 30

  # 6. 자동 통합 테스트 (선택사항)
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    needs: deploy-release-environment
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for services to be ready
        run: |
          echo "⏳ 릴리즈 환경이 준비될 때까지 대기..."
          sleep 60

      - name: Run integration tests
        run: |
          echo "🧪 통합 테스트 실행 중..."
          
          # API 엔드포인트 테스트
          echo "📡 API 테스트..."
          health_response=$(curl -s http://localhost:8082/actuator/health || echo "failed")
          if echo "$health_response" | grep -q "UP"; then
            echo "✅ 백엔드 API 정상"
          else
            echo "❌ 백엔드 API 오류"
            exit 1
          fi
          
          # 프론트엔드 테스트
          echo "🎨 프론트엔드 테스트..."
          frontend_response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3002 || echo "000")
          if [ "$frontend_response" = "200" ]; then
            echo "✅ 프론트엔드 정상"
          else
            echo "❌ 프론트엔드 오류"
            exit 1
          fi
          
          echo "🎉 모든 통합 테스트 통과!"

  # 7. 릴리즈 알림
  notify-release-ready:
    name: Notify Release Ready
    runs-on: ubuntu-latest
    needs: [extract-release-info, deploy-release-environment, integration-tests]
    if: always()
    steps:
      - name: Send Slack Notification
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ "${{ needs.integration-tests.result }}" = "success" ]; then
            status="✅ 준비 완료"
            color="good"
            message="릴리즈 환경 배포가 완료되었습니다! 팀 리뷰를 진행해주세요."
            next_action="👥 팀 리뷰 → main 브랜치 머지 → 프로덕션 배포"
          else
            status="❌ 문제 발생"
            color="danger"
            message="릴리즈 환경에서 문제가 발견되었습니다."
            next_action="🔧 릴리즈 브랜치에서 수정 필요"
          fi
          
          cat << EOF > slack_message.json
          {
            "attachments": [
              {
                "color": "$color",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "🎯 릴리즈 준비 알림 - ${{ needs.extract-release-info.outputs.version }}"
                    }
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*상태*: $status\n*메시지*: $message"
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*버전*\n${{ needs.extract-release-info.outputs.version }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*브랜치*\n${{ github.ref_name }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*테스트 URL*\nFE: localhost:3002\nBE: localhost:8082"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*다음 단계*\n$next_action"
                      }
                    ]
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": {
                          "type": "plain_text",
                          "text": "GitHub Actions 보기"
                        },
                        "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                      },
                      {
                        "type": "button",
                        "text": {
                          "type": "plain_text",
                          "text": "릴리즈 브랜치 보기"
                        },
                        "url": "${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF
          
          curl -X POST -H 'Content-type: application/json' \
            --data @slack_message.json \
            "$SLACK_WEBHOOK_URL"
