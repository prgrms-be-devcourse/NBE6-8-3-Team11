name: CI

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  backend-build:
    name: Backend - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        
      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew
        
      - name: Gradle Build (Allow failures during Kotlin migration)
        run: ./gradlew build -x test
        continue-on-error: true
        
      - name: Migration Status Check
        run: |
          echo "ℹ️ Build may fail during Kotlin migration phase"
          echo "Manual code review required for Kotlin compatibility"
          echo "Check build logs above for specific compilation errors"

  backend-test:
    name: Backend - Test  
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    needs: backend-build
    if: success() || failure() # 빌드 실패해도 테스트는 시도
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        
      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew
        
      - name: Run Tests (Java files only during migration)
        run: ./gradlew test -x compileKotlin
        continue-on-error: true

  frontend-check:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Run Lint
        run: npm run lint
        
      - name: Build Frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://nbe6-8-2-team11.onrender.com

  # 마이그레이션 완료 후 활성화할 준비된 CI
  # TODO: 전체 Kotlin 마이그레이션 완료 시 아래 주석 해제하고 위의 jobs들 교체 해야하아아암
