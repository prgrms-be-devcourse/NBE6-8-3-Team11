name: Fork CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Fork에서는 간단한 테스트만 수행
  fork-test:
    runs-on: ubuntu-latest
    # Fork에서만 실행 (조직 레포가 아닐 때)
    if: github.repository != 'prgrms-be-devcourse/NBE6-8-2-Team11'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Frontend lint check
      run: |
        cd frontend
        npm run lint

    - name: Frontend build check
      run: |
        cd frontend
        npm run build
      env:
        NEXT_PUBLIC_API_URL: https://nbe6-8-2-team11.onrender.com

    - name: Backend build check
      run: |
        cd backend
        chmod +x ./gradlew
        ./gradlew build -x test

    - name: Fork CI completed
      run: |
        echo "✅ Fork CI checks completed successfully!"
        echo "📝 This is a development fork - no deployment performed"

  # 원래 조직 레포용 CI (PR용)
  main-repo-ci:
    runs-on: ubuntu-latest
    # 조직 레포에서만 실행
    if: github.repository == 'prgrms-be-devcourse/NBE6-8-2-Team11' && github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Run frontend tests
      run: |
        cd frontend
        npm run lint
        npm run build
      env:
        NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

    - name: Run backend tests
      run: |
        cd backend
        chmod +x ./gradlew
        ./gradlew test
        ./gradlew build

    - name: PR CI completed
      run: |
        echo "✅ PR CI checks completed successfully!"
