  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - frontend-check
    if: always() && github.repository == 'prgrms-be-devcourse/NBE6-8-3-Team11' && github.event_name == 'pull_request'
    steps:
      - name: Send Slack Notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "⚠️ SLACK_WEBHOOK_URL이 설정되지 않았습니다."
            exit 0
          fi
          
          # 빌드 결과 확인
          backend_result="${{ needs.backend-test.result }}"
          frontend_result="${{ needs.frontend-check.result }}"
          
          # 마이그레이션 중 상태 메시지
          if [ "$backend_result" != "success" ]; then
            migration_status="⚠️ Kotlin 마이그레이션 진행 중 - 수동 리뷰 필요"
          else
            migration_status="✅ 빌드 성공"
          fi
          
          # PR 정보 수집
          pr_title="${{ github.event.pull_request.title }}"
          pr_url="${{ github.event.pull_request.html_url }}"
          pr_author="${{ github.event.pull_request.user.login }}"
          pr_number="${{ github.event.pull_request.number }}"
          
          # Slack 메시지 생성
          cat << EOF > slack_message.json
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🔔 PR 리뷰 요청 (Kotlin 마이그레이션 중)"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*제목*\n\`\`\`${pr_title}\`\`\`"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*작성자*\n👤 @${pr_author}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*PR 번호*\n<${pr_url}|#${pr_number}>"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Backend*\n${migration_status}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Frontend*\n${frontend_result}"
                  }
                ]
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "리뷰하러 가기"
                    },
                    "style": "primary",
                    "url": "${pr_url}"
                  },
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "빌드 로그 확인"
                    },
                    "url": "${pr_url}/checks"
                  }
                ]
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "💡 Kotlin 마이그레이션 중이므로 수동 코드 리뷰가 필요합니다"
                  }
                ]
              }
            ]
          }
          EOF
          
          # Slack으로 메시지 전송
          curl -X POST -H 'Content-type: application/json' \
            --data @slack_message.json \
            "$SLACK_WEBHOOK_URL"
