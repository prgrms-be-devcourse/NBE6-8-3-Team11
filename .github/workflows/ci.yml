name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  backend-build:
    name: Backend - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        
      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew
        
      # 엄격한 빌드 (실패 시 파이프라인 중단)
      - name: Gradle Build (Java + Kotlin)
        run: ./gradlew build -x test --no-daemon

  backend-test:
    name: Backend - Test  
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    needs: backend-build
    if: success() || failure()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        
      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew
        
      # 엄격한 테스트 (Java + Kotlin 모두 컴파일 및 테스트)
      - name: Run Tests (Java + Kotlin)
        run: ./gradlew test --no-daemon

  frontend-check:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Run Lint
        run: npm run lint
        
      - name: Build Frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://nbe6-8-3-team11.fly.dev

  # 메인 레포 PR용 슬랙 알림 (엄격한 검증 결과 반영으로 업데이트 하겠습니다~)
  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - frontend-check
    if: always() && github.repository == 'prgrms-be-devcourse/NBE6-8-3-Team11' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    steps:
      - name: Send Slack Notification (Main Repo PR)
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL이 설정되지 않았습니다."
            exit 0
          fi
          
          pr_title="${{ github.event.pull_request.title }}"
          pr_url="${{ github.event.pull_request.html_url }}"
          pr_author="${{ github.event.pull_request.user.login }}"
          pr_number="${{ github.event.pull_request.number }}"
          backend_result="${{ needs.backend-test.result }}"
          frontend_result="${{ needs.frontend-check.result }}"
          
          # 엄격한 검증: 모든 단계 성공해야만 통과
          if [ "$backend_result" == "success" ] && [ "$frontend_result" == "success" ]; then
            status_emoji="✅"
            status_text="모든 검증 통과 - 머지 가능"
            color="good"
          else
            status_emoji="❌"
            status_text="검증 실패 - 코드 수정 필요"
            color="danger"
          fi
          
          cat << EOF > slack_message.json
          {
            "attachments": [
              {
                "color": "${color}",
                "blocks": [
                  {
                    "type": "header", 
                    "text": {
                      "type": "plain_text",
                      "text": "${status_emoji} 메인 레포 PR #${pr_number}"
                    }
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*${pr_title}*"
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*작성자*\n${pr_author}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*상태*\n${status_text}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*백엔드*\n${backend_result}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*프론트엔드*\n${frontend_result}"
                      }
                    ]
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": {
                          "type": "plain_text",
                          "text": "PR 확인"
                        },
                        "style": "primary",
                        "url": "${pr_url}"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF
          
          curl -X POST -H 'Content-type: application/json' \
            --data @slack_message.json \
            "$SLACK_WEBHOOK_URL"

  # 포크 레포 PR용 슬랙 알림 (엄격한 검증 결과 반영)
  fork-slack-notify:
    name: Fork Slack Notify
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - frontend-check
    if: always() && github.repository == 'prgrms-be-devcourse/NBE6-8-3-Team11' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
    steps:
      - name: Send Slack Notification (Fork PR)
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL이 설정되지 않았습니다."
            exit 0
          fi
          
          pr_title="${{ github.event.pull_request.title }}"
          pr_url="${{ github.event.pull_request.html_url }}"
          pr_author="${{ github.event.pull_request.user.login }}"
          pr_number="${{ github.event.pull_request.number }}"
          fork_repo="${{ github.event.pull_request.head.repo.full_name }}"
          backend_result="${{ needs.backend-test.result }}"
          frontend_result="${{ needs.frontend-check.result }}"
          
          # 엄격한 검증: 모든 단계 성공해야만 통과
          if [ "$backend_result" == "success" ] && [ "$frontend_result" == "success" ]; then
            status_emoji="✅"
            status_text="모든 검증 통과 - 머지 가능"
            color="good"
          else
            status_emoji="❌"
            status_text="검증 실패 - 코드 수정 필요"
            color="danger"
          fi
          
          cat << EOF > slack_message.json
          {
            "attachments": [
              {
                "color": "${color}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "${status_emoji} 포크 PR #${pr_number}"
                    }
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*${pr_title}*"
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*작성자*\n${pr_author}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*포크 레포*\n${fork_repo}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*상태*\n${status_text}"
                      }
                    ]
                  },
                  {
                    "type": "section",
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*백엔드*\n${backend_result}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*프론트엔드*\n${frontend_result}"
                      }
                    ]
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": {
                          "type": "plain_text",
                          "text": "PR 확인"
                        },
                        "style": "primary",
                        "url": "${pr_url}"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF
          
          curl -X POST -H 'Content-type: application/json' \
            --data @slack_message.json \
            "$SLACK_WEBHOOK_URL"
