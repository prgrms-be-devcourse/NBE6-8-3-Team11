name: CI

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  backend-build:
    name: Backend - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        
      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew
        
      - name: Gradle Build (Allow failures during Kotlin migration)
        run: ./gradlew build -x test
        continue-on-error: true

  backend-test:
    name: Backend - Test  
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    needs: backend-build
    if: success() || failure()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        
      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew
        
      - name: Run Tests (Java files only during migration)
        run: ./gradlew test -x compileKotlin
        continue-on-error: true

  frontend-check:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Run Lint
        run: npm run lint
        
      - name: Build Frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://nbe6-8-2-team11.onrender.com

  # 메인 레포 PR용 슬랙 알림
  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - frontend-check
    if: always() && github.repository == 'prgrms-be-devcourse/NBE6-8-3-Team11' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    steps:
      - name: Send Slack Notification (Main Repo PR)
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL이 설정되지 않았습니다."
            exit 0
          fi
          
          pr_title="${{ github.event.pull_request.title }}"
          pr_url="${{ github.event.pull_request.html_url }}"
          pr_author="${{ github.event.pull_request.user.login }}"
          pr_number="${{ github.event.pull_request.number }}"
          backend_result="${{ needs.backend-test.result }}"
          frontend_result="${{ needs.frontend-check.result }}"
          
          if [ "$backend_result" == "success" ] && [ "$frontend_result" == "success" ]; then
            status_emoji="✅"
            status_text="모든 테스트 통과"
            color="good"
          elif [ "$frontend_result" == "success" ]; then
            status_emoji="⚠️"
            status_text="Kotlin 마이그레이션 중 - 백엔드 수동 리뷰 필요"
            color="warning"
          else
            status_emoji="❌"
            status_text="빌드 실패 - 코드 수정 필요"
            color="danger"
          fi
          
          cat << EOF > slack_message.json
          {
            "attachments": [
              {
                "color": "${color}",
                "blocks": [
                  {
                    "type": "header", 
                    "text": {
                      "type": "plain_text",
                      "text": "${status_emoji} 메인 레포 PR #${pr_number}"
                    }
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*${pr_title}*"
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*작성자*\n${pr_author}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*상태*\n${status_text}"
                      }
                    ]
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": {
                          "type": "plain_text",
                          "text": "PR 확인"
                        },
                        "style": "primary",
                        "url": "${pr_url}"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF
          
          curl -X POST -H 'Content-type: application/json' \
            --data @slack_message.json \
            "$SLACK_WEBHOOK_URL"

  # 포크 레포 PR용 슬랙 알림  
  fork-slack-notify:
    name: Fork Slack Notify
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - frontend-check
    if: always() && github.repository == 'prgrms-be-devcourse/NBE6-8-3-Team11' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
    steps:
      - name: Send Slack Notification (Fork PR)
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL이 설정되지 않았습니다."
            exit 0
          fi
          
          pr_title="${{ github.event.pull_request.title }}"
          pr_url="${{ github.event.pull_request.html_url }}"
          pr_author="${{ github.event.pull_request.user.login }}"
          pr_number="${{ github.event.pull_request.number }}"
          fork_repo="${{ github.event.pull_request.head.repo.full_name }}"
          backend_result="${{ needs.backend-test.result }}"
          frontend_result="${{ needs.frontend-check.result }}"
          
          if [ "$backend_result" == "success" ] && [ "$frontend_result" == "success" ]; then
            status_emoji="✅"
            status_text="모든 테스트 통과"
            color="good"
          elif [ "$frontend_result" == "success" ]; then
            status_emoji="⚠️"
            status_text="Kotlin 마이그레이션 중 - 백엔드 수동 리뷰 필요"
            color="warning"
          else
            status_emoji="❌"
            status_text="빌드 실패 - 코드 수정 필요"
            color="danger"
          fi
          
          cat << EOF > slack_message.json
          {
            "attachments": [
              {
                "color": "${color}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "${status_emoji} 포크 PR #${pr_number}"
                    }
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*${pr_title}*"
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*작성자*\n${pr_author}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*포크 레포*\n${fork_repo}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*상태*\n${status_text}"
                      }
                    ]
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": {
                          "type": "plain_text",
                          "text": "PR 확인"
                        },
                        "style": "primary",
                        "url": "${pr_url}"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF
          
          curl -X POST -H 'Content-type: application/json' \
            --data @slack_message.json \
            "$SLACK_WEBHOOK_URL"

