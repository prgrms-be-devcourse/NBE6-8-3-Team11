name: CI
on:
  pull_request:
    branches:
      - develop
jobs:
  backend-build:
    name: Backend - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-
      - name: Gradle Build Only
        run: ./gradlew build -x test
  backend-test:
    name: Backend - Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    needs: backend-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-
      - name: Run Tests
        run: ./gradlew test
  frontend-check:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-
      - name: Install Dependencies
        run: npm ci
      - name: Run Lint
        run: npm run lint
      - name: Build Frontend
        run: npm run build

  # CI 완료 후 Slack 알림
  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - frontend-check
    # 일반 저장소에서만 실행 (Fork가 아닐 때)
    if: ${{ success() && github.event.pull_request.head.repo.fork != true }}
    steps:
      - name: Send Slack Notification
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          pr_title="${{ github.event.pull_request.title }}"
          pr_url="${{ github.event.pull_request.html_url }}"
          pr_author="${{ github.event.pull_request.user.login }}"
          pr_number="${{ github.event.pull_request.number }}"
          
          # 예쁜 Block Kit 메시지 생성
          cat << 'EOF' > slack_message.json
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🔔 새로운 PR 리뷰 요청!"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*제목*\n```TITLE_PLACEHOLDER```"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*작성자*\n👤 @AUTHOR_PLACEHOLDER"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*PR 번호*\n<URL_PLACEHOLDER|#NUMBER_PLACEHOLDER>"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*소스*\n🏠 Main Repo"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*상태*\n✅ CI 테스트 통과"
                  }
                ]
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "리뷰하러 가기 🚀"
                    },
                    "style": "primary",
                    "url": "URL_PLACEHOLDER"
                  },
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "변경사항 보기 📝"
                    },
                    "url": "URL_PLACEHOLDER/files"
                  }
                ]
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "💡 모든 CI 테스트가 통과했습니다!"
                  }
                ]
              }
            ]
          }
          EOF
          
          # 플레이스홀더 교체 (특수문자 안전 처리)
          escaped_title=$(printf '%s\n' "$pr_title" | sed 's/[[\.*^$()+?{|]/\\&/g')
          escaped_author=$(printf '%s\n' "$pr_author" | sed 's/[[\.*^$()+?{|]/\\&/g')
          escaped_url=$(printf '%s\n' "$pr_url" | sed 's/[[\.*^$()+?{|]/\\&/g')
          
          sed -i "s|TITLE_PLACEHOLDER|$escaped_title|g" slack_message.json
          sed -i "s|AUTHOR_PLACEHOLDER|$escaped_author|g" slack_message.json
          sed -i "s|NUMBER_PLACEHOLDER|$pr_number|g" slack_message.json
          sed -i "s|URL_PLACEHOLDER|$escaped_url|g" slack_message.json
          
          curl -X POST -H 'Content-type: application/json' \
            --data @slack_message.json \
            "$SLACK_WEBHOOK_URL"
          
          echo "✅ Main Repo PR 알림 전송 완료!"

  # Fork PR에 대한 별도 알림
  fork-notify:
    name: Fork Slack Notify
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - frontend-check
    # Fork에서만 실행하되, secrets 접근 불가로 인해 실제로는 skipped
    if: ${{ success() && github.event.pull_request.head.repo.fork == true }}
    steps:
      - name: Fork Notification Info
        run: |
          echo "🔀 Fork PR 감지됨"
          echo "⚠️ Fork에서는 secrets 접근 불가로 슬랙 알림을 보낼 수 없습니다."
          echo "PR 정보:"
          echo "- 제목: ${{ github.event.pull_request.title }}"
          echo "- 작성자: ${{ github.event.pull_request.user.login }}"
          echo "- PR 번호: ${{ github.event.pull_request.number }}"
          echo "- URL: ${{ github.event.pull_request.html_url }}"
          echo ""
          echo "💡 Fork PR의 슬랙 알림은 별도 워크플로우에서 처리됩니다."
