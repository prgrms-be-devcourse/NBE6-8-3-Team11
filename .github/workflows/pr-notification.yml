name: PR Notification

on:
  pull_request_target:
    types: [opened, ready_for_review, synchronize, reopened]
    branches:
      - main
      - develop
  # 본인 PR 테스트를 위한 일반 pull_request 이벤트 추가
  pull_request:
    types: [opened, ready_for_review, synchronize, reopened]
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR 번호'
        required: true
        type: string

jobs:
  # 수동 실행용 테스트 Job
  test-manual:
    name: Manual Test Notification
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Send Manual Test Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          cat << 'EOF' > manual_test.json
          {
            "text": "🧪 수동 테스트 성공! PR #${{ inputs.pr_number }} 알림 기능이 작동합니다!"
          }
          EOF
          
          curl -X POST -H 'Content-type: application/json' \
            --data @manual_test.json \
            "$SLACK_WEBHOOK_URL"
          
          echo "수동 테스트 알림 전송 완료!"

  # CI 작업들이 완료되었는지 확인하는 Job
  # 간단하고 확실한 알림 (CI 완료 후)
  simple-notify:
    name: Simple Slack Notify  
    runs-on: ubuntu-latest
    # 디버깅을 위해 조건 완화
    if: ${{ !github.event.pull_request.draft }}
    steps:
      # CI 완료까지 대기 (간단한 방법)
      - name: Wait for CI completion
        run: |
          echo "CI 완료를 기다리는 중..."
          sleep 60  # 1분 대기 (대부분의 CI는 1분 안에 완료)
          
      - name: Send Fork-Compatible Slack Notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          pr_title="${{ github.event.pull_request.title }}"
          pr_url="${{ github.event.pull_request.html_url }}"
          pr_author="${{ github.event.pull_request.user.login }}"
          pr_number="${{ github.event.pull_request.number }}"
          
          # Fork 여부 확인
          if [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ]; then
            source_info="🔀 Fork"
          else
            source_info="🏠 Main Repo"
          fi
          
          # 예쁜 Block Kit 메시지로 전송
          cat << EOF > slack_message.json
{
  "blocks": [
    {
      "type": "header",
      "text": {
        "type": "plain_text",
        "text": "🔔 새로운 PR 리뷰 요청!"
      }
    },
    {
      "type": "section",
      "text": {
        "type": "mrkdwn",
        "text": "*제목*\n\`\`\`$pr_title\`\`\`"
      }
    },
    {
      "type": "section",
      "fields": [
        {
          "type": "mrkdwn",
          "text": "*작성자*\n👤 @$pr_author"
        },
        {
          "type": "mrkdwn",
          "text": "*PR 번호*\n<$pr_url|#$pr_number>"
        },
        {
          "type": "mrkdwn",
          "text": "*소스*\n$source_info"
        },
        {
          "type": "mrkdwn",
          "text": "*상태*\n⏳ CI 완료 후 리뷰 대기"
        }
      ]
    },
    {
      "type": "actions",
      "elements": [
        {
          "type": "button",
          "text": {
            "type": "plain_text",
            "text": "리뷰하러 가기 🚀"
          },
          "style": "primary",
          "url": "$pr_url"
        },
        {
          "type": "button",
          "text": {
            "type": "plain_text",
            "text": "변경사항 보기 📝"
          },
          "url": "$pr_url/files"
        }
      ]
    },
    {
      "type": "context",
      "elements": [
        {
          "type": "mrkdwn",
          "text": "💡 Fork에서도 알림이 정상 작동합니다!"
        }
      ]
    }
  ]
}
EOF
          
          curl -X POST -H 'Content-type: application/json' \
            --data @slack_message.json \
            "$SLACK_WEBHOOK_URL"
          
          echo "Fork 호환 PR 알림 전송 완료!"
