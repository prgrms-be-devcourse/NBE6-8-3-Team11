name: Fork PR Notification

on:
  pull_request_target:
    types: [opened, ready_for_review, synchronize, reopened]
    branches:
      - develop

jobs:
  # CI 체크 job 추가
  check-ci:
    name: Check CI Status
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft && github.event.pull_request.head.repo.fork == true }}
    outputs:
      ci-success: ${{ steps.check.outputs.success }}
    steps:
      - name: Check CI Status
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha
            });
            
            // CI 관련 체크만 필터링
            const ciChecks = checkRuns.check_runs.filter(check => 
              check.name.includes('Backend') || 
              check.name.includes('Frontend') ||
              check.name.includes('CI')
            );
            
            const allSuccess = ciChecks.length > 0 && ciChecks.every(check => check.conclusion === 'success');
            
            console.log('CI Checks:', ciChecks.map(c => `${c.name}: ${c.conclusion}`));
            console.log('All CI Success:', allSuccess);
            
            core.setOutput('success', allSuccess);
            
            return allSuccess;

  fork-notify:
    name: Fork Slack Notify
    runs-on: ubuntu-latest
    needs: check-ci
    # CI가 성공했을 때만 실행
    if: ${{ needs.check-ci.outputs.ci-success == 'true' }}
    steps:
      - name: Send Fork Slack Notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          pr_title="${{ github.event.pull_request.title }}"
          pr_url="${{ github.event.pull_request.html_url }}"
          pr_author="${{ github.event.pull_request.user.login }}"
          pr_number="${{ github.event.pull_request.number }}"
          
          cat << 'EOF' > slack_message.json
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🔔 Fork PR 리뷰 요청!"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*제목*\n```TITLE_PLACEHOLDER```"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*작성자*\n👤 @AUTHOR_PLACEHOLDER"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*PR 번호*\n<URL_PLACEHOLDER|#NUMBER_PLACEHOLDER>"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*소스*\n🔀 Fork"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*상태*\n✅ CI 완료 후 리뷰 대기"
                  }
                ]
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "리뷰하러 가기 🚀"
                    },
                    "style": "primary",
                    "url": "URL_PLACEHOLDER"
                  }
                ]
              }
            ]
          }
          EOF
          
          # 플레이스홀더 교체 (특수문자 안전 처리)
          escaped_title=$(printf '%s\n' "$pr_title" | sed 's/[[\.*^$()+?{|]/\\&/g')
          escaped_author=$(printf '%s\n' "$pr_author" | sed 's/[[\.*^$()+?{|]/\\&/g')
          escaped_url=$(printf '%s\n' "$pr_url" | sed 's/[[\.*^$()+?{|]/\\&/g')
          
          sed -i "s|TITLE_PLACEHOLDER|$escaped_title|g" slack_message.json
          sed -i "s|AUTHOR_PLACEHOLDER|$escaped_author|g" slack_message.json
          sed -i "s|NUMBER_PLACEHOLDER|$pr_number|g" slack_message.json
          sed -i "s|URL_PLACEHOLDER|$escaped_url|g" slack_message.json
          
          curl -X POST -H 'Content-type: application/json' \
            --data @slack_message.json \
            "$SLACK_WEBHOOK_URL"
          
          echo "Fork PR 알림 전송 완료!"
