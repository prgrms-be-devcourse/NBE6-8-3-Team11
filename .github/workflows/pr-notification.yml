name: PR Notification
# pull_request_target: fork에서 PR을 보내도 본 저장소 권한으로 실행되어 secrets 접근 가능
on:
  pull_request_target:
    types: [opened, ready_for_review, synchronize]
    branches:
      - main
      - develop

jobs:
  # CI 작업들이 완료되었는지 확인하는 Job
  wait-for-ci:
    name: Wait for CI Completion
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}  # 드래프트 PR은 제외
    steps:
      - name: Wait for CI workflows
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: 'Backend - Test'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          allowed-conclusions: success,failure,cancelled,skipped
      
      - name: Wait for Frontend check
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: 'Frontend - Lint & Build'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          allowed-conclusions: success,failure,cancelled,skipped

  # CI 성공 시에만 Slack 알림 전송
  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: wait-for-ci
    if: ${{ !github.event.pull_request.draft && success() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # pull_request_target에서는 base 브랜치를 체크아웃하므로 
          # PR의 head를 명시적으로 체크아웃
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Install GitHub CLI
        run: sudo apt-get update && sudo apt-get install -y gh

      - name: Check CI Status and Send Slack Notification
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # 현재 PR의 CI 상태 확인
          ci_status=$(gh pr checks $PR_NUMBER --json conclusion -q '.[].conclusion' | sort -u)
          
          # 모든 체크가 성공했는지 확인
          if echo "$ci_status" | grep -v "SUCCESS" | grep -q "."; then
            echo "CI가 아직 진행 중이거나 실패했습니다. 알림을 보내지 않습니다."
            exit 0
          fi
          
          # 리뷰어 목록 가져오기
          reviewers=$(gh pr view $PR_NUMBER --json reviewRequests -q '.reviewRequests[].requestedReviewer.login' 2>/dev/null | tr '\n' ', ' | sed 's/,$//')
          if [ -z "$reviewers" ]; then
            reviewers="리뷰어 미지정"
          fi
          
          # 작성자 정보
          author="${{ github.event.pull_request.user.login }}"
          
          # PR이 fork에서 온 것인지 확인
          is_fork="${{ github.event.pull_request.head.repo.fork }}"
          fork_info=""
          if [ "$is_fork" = "true" ]; then
            fork_info=" (Fork에서 생성)"
          fi
          
          # 리뷰어 포맷팅
          if [ "$reviewers" = "리뷰어 미지정" ]; then
            reviewer_text="👤 리뷰어 미지정"
          else
            reviewer_text="👥 @$reviewers"
          fi
          
          # Fork 정보 포맷팅
          if [ "$is_fork" = "true" ]; then
            fork_badge="🔀 Fork"
          else
            fork_badge="🏠 Main Repo"
          fi
          
          # PR 제목 이스케이프 처리
          title_escaped=$(echo "${{ github.event.pull_request.title }}" | sed 's/"/\\"/g')
          
          # Slack Block Kit 메시지 생성 (한 줄씩 세로 배치)
          cat << EOF > slack_message.json
{
  "blocks": [
    {
      "type": "header",
      "text": {
        "type": "plain_text",
        "text": "🔔 새로운 PR 리뷰 요청"
      }
    },
    {
      "type": "section",
      "text": {
        "type": "mrkdwn",
        "text": "*제목*\n\`\`\`${title_escaped}\`\`\`"
      }
    },
    {
      "type": "section",
      "text": {
        "type": "mrkdwn",
        "text": "*작성자*\n👤 @${author}"
      }
    },
    {
      "type": "section",
      "text": {
        "type": "mrkdwn",
        "text": "*리뷰어*\n${reviewer_text}"
      }
    },
    {
      "type": "section",
      "text": {
        "type": "mrkdwn",
        "text": "*PR 번호*\n<${{ github.event.pull_request.html_url }}|#$PR_NUMBER>"
      }
    },
    {
      "type": "section",
      "text": {
        "type": "mrkdwn",
        "text": "*상태*\n✅ CI 테스트 통과"
      }
    },
    {
      "type": "section",
      "text": {
        "type": "mrkdwn",
        "text": "*소스*\n${fork_badge}"
      }
    },
    {
      "type": "actions",
      "elements": [
        {
          "type": "button",
          "text": {
            "type": "plain_text",
            "text": "리뷰하러 가기 🚀"
          },
          "style": "primary",
          "url": "${{ github.event.pull_request.html_url }}"
        },
        {
          "type": "button",
          "text": {
            "type": "plain_text",
            "text": "변경사항 보기 📝"
          },
          "url": "${{ github.event.pull_request.html_url }}/files"
        }
      ]
    },
    {
      "type": "context",
      "elements": [
        {
          "type": "mrkdwn",
          "text": "💡 빠른 리뷰로 팀 개발 속도를 높여보세요!"
        }
      ]
    }
  ]
}
EOF
          
          # 슬랙 전송
          curl -X POST -H 'Content-type: application/json' \
            --data @slack_message.json \
            "$SLACK_WEBHOOK_URL"
          
          echo "Slack 알림이 성공적으로 전송되었습니다."

  # CI 실패 시 별도 알림 (선택사항)
  notify-failure:
    name: Notify CI Failure
    runs-on: ubuntu-latest
    needs: wait-for-ci
    if: ${{ !github.event.pull_request.draft && failure() }}
    steps:
      - name: Send Failure Notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # PR 제목 이스케이프 처리
          title_escaped=$(echo "${{ github.event.pull_request.title }}" | sed 's/"/\\"/g')
          
          # Slack Block Kit 실패 메시지 생성 (한 줄씩 세로 배치)
          cat << EOF > slack_failure.json
{
  "blocks": [
    {
      "type": "header",
      "text": {
        "type": "plain_text",
        "text": "❌ PR CI 테스트 실패"
      }
    },
    {
      "type": "section",
      "text": {
        "type": "mrkdwn",
        "text": "*제목*\n\`\`\`${title_escaped}\`\`\`"
      }
    },
    {
      "type": "section",
      "text": {
        "type": "mrkdwn",
        "text": "*작성자*\n👤 @${{ github.event.pull_request.user.login }}"
      }
    },
    {
      "type": "section",
      "text": {
        "type": "mrkdwn",
        "text": "*PR 번호*\n<${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }}>"
      }
    },
    {
      "type": "section",
      "text": {
        "type": "mrkdwn",
        "text": "*상태*\n🚨 CI 테스트 실패"
      }
    },
    {
      "type": "section",
      "text": {
        "type": "mrkdwn",
        "text": "⚠️ *CI 테스트에서 오류가 발생했습니다.*\n코드를 확인하고 수정이 필요합니다."
      }
    },
    {
      "type": "actions",
      "elements": [
        {
          "type": "button",
          "text": {
            "type": "plain_text",
            "text": "오류 확인하기 🔍"
          },
          "style": "danger",
          "url": "${{ github.event.pull_request.html_url }}/checks"
        },
        {
          "type": "button",
          "text": {
            "type": "plain_text",
            "text": "PR 보기 📝"
          },
          "url": "${{ github.event.pull_request.html_url }}"
        }
      ]
    }
  ]
}
EOF
          
          curl -X POST -H 'Content-type: application/json' \
            --data @slack_failure.json \
            "$SLACK_WEBHOOK_URL"
