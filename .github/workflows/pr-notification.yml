name: PR Notification

on:
  pull_request_target:
    types: [opened, ready_for_review, synchronize, reopened]
    branches:
      - main
      - develop
  pull_request:
    types: [opened, ready_for_review, synchronize, reopened]
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR 번호'
        required: true
        type: string

jobs:
  test-manual:
    name: Manual Test Notification
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Send Manual Test Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          cat << 'EOF' > manual_test.json
          {
            "text": "🧪 수동 테스트 성공! PR #${{ inputs.pr_number }} 알림 기능이 작동합니다!"
          }
          EOF
          
          curl -X POST -H 'Content-type: application/json' \
            --data @manual_test.json \
            "$SLACK_WEBHOOK_URL"
          
          echo "수동 테스트 알림 전송 완료!"

  simple-notify:
    name: Simple Slack Notify
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Wait for CI completion
        run: |
          echo "CI 완료를 기다리는 중..."
          sleep 60
          
      - name: Send Slack Notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          pr_title="${{ github.event.pull_request.title }}"
          pr_url="${{ github.event.pull_request.html_url }}"
          pr_author="${{ github.event.pull_request.user.login }}"
          pr_number="${{ github.event.pull_request.number }}"
          
          if [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ]; then
            source_info="🔀 Fork"
          else
            source_info="🏠 Main Repo"
          fi
          
          cat << 'EOF' > slack_message.json
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🔔 새로운 PR 리뷰 요청!"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*제목*\n```TITLE_PLACEHOLDER```"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*작성자*\n👤 @AUTHOR_PLACEHOLDER"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*PR 번호*\n<URL_PLACEHOLDER|#NUMBER_PLACEHOLDER>"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*소스*\nSOURCE_PLACEHOLDER"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*상태*\n⏳ CI 완료 후 리뷰 대기"
                  }
                ]
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "리뷰하러 가기 🚀"
                    },
                    "style": "primary",
                    "url": "URL_PLACEHOLDER"
                  },
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "변경사항 보기 📝"
                    },
                    "url": "URL_PLACEHOLDER/files"
                  }
                ]
              }
            ]
          }
          EOF
          
          # 플레이스홀더 교체
          sed -i "s/TITLE_PLACEHOLDER/$pr_title/g" slack_message.json
          sed -i "s/AUTHOR_PLACEHOLDER/$pr_author/g" slack_message.json
          sed -i "s/NUMBER_PLACEHOLDER/$pr_number/g" slack_message.json
          sed -i "s|URL_PLACEHOLDER|$pr_url|g" slack_message.json
          sed -i "s/SOURCE_PLACEHOLDER/$source_info/g" slack_message.json
          
          curl -X POST -H 'Content-type: application/json' \
            --data @slack_message.json \
            "$SLACK_WEBHOOK_URL"
          
          echo "Slack 알림 전송 완료!"
