name: Fork PR Notification

on:
  pull_request_target:
    types: [opened, ready_for_review, synchronize, reopened]
    branches:
      - main
      - develop

jobs:
  fork-notify:
    name: Fork Slack Notify
    runs-on: ubuntu-latest
    # Fork에서만 실행
    if: ${{ !github.event.pull_request.draft && github.event.pull_request.head.repo.fork == true }}
    steps:
      - name: Wait for CI completion
        run: |
          echo "CI 완료를 기다리는 중..."
          sleep 180  # 3분 대기
          
      - name: Send Fork Slack Notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          pr_title="${{ github.event.pull_request.title }}"
          pr_url="${{ github.event.pull_request.html_url }}"
          pr_author="${{ github.event.pull_request.user.login }}"
          pr_number="${{ github.event.pull_request.number }}"
          
          cat << 'EOF' > slack_message.json
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🔔 Fork PR 리뷰 요청!"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*제목*\n```TITLE_PLACEHOLDER```"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*작성자*\n👤 @AUTHOR_PLACEHOLDER"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*PR 번호*\n<URL_PLACEHOLDER|#NUMBER_PLACEHOLDER>"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*소스*\n🔀 Fork"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*상태*\n✅ CI 완료 후 리뷰 대기"
                  }
                ]
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "리뷰하러 가기 🚀"
                    },
                    "style": "primary",
                    "url": "URL_PLACEHOLDER"
                  }
                ]
              }
            ]
          }
          EOF
          
          # 플레이스홀더 교체
          sed -i "s/TITLE_PLACEHOLDER/$pr_title/g" slack_message.json
          sed -i "s/AUTHOR_PLACEHOLDER/$pr_author/g" slack_message.json
          sed -i "s/NUMBER_PLACEHOLDER/$pr_number/g" slack_message.json
          sed -i "s|URL_PLACEHOLDER|$pr_url|g" slack_message.json
          
          curl -X POST -H 'Content-type: application/json' \
            --data @slack_message.json \
            "$SLACK_WEBHOOK_URL"
          
          echo "Fork PR 알림 전송 완료!"
