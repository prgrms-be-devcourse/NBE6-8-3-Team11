name: Fork PR Notification

on:
  pull_request_target:
    types: [opened, ready_for_review, synchronize, reopened]
    branches:
      - main
      - develop

jobs:
  fork-notify:
    name: Fork Slack Notify
    runs-on: ubuntu-latest
    # Fork에서만 실행
    if: ${{ !github.event.pull_request.draft && github.event.pull_request.head.repo.fork == true }}
    steps:
      - name: Wait for CI completion and check status
        run: |
          echo "CI 상태를 확인하는 중..."
          
          # 최대 10분 대기 (600초)
          max_wait=600
          wait_time=0
          
          while [ $wait_time -lt $max_wait ]; do
            echo "CI 상태 확인 중... (${wait_time}초 경과)"
            
            # GitHub CLI로 PR 체크 상태 확인
            checks=$(gh pr checks ${{ github.event.pull_request.number }} --json conclusion,name,status 2>/dev/null || echo "[]")
            
            echo "현재 체크 상태: $checks"
            
            # 결과가 있는지 확인
            if [ "$checks" != "[]" ] && [ "$checks" != "" ]; then
              # 실패한 체크가 있는지 확인
              failed_checks=$(echo "$checks" | jq -r '.[] | select(.conclusion == "FAILURE") | .name' 2>/dev/null || echo "")
              
              if [ -n "$failed_checks" ]; then
                echo "❌ 실패한 CI가 있습니다: $failed_checks"
                echo "알림을 보내지 않습니다."
                exit 0
              fi
              
              # 성공한 체크 확인
              success_checks=$(echo "$checks" | jq -r '.[] | select(.conclusion == "SUCCESS") | .name' 2>/dev/null || echo "")
              echo "성공한 체크들: $success_checks"
              
              # Backend와 Frontend 관련 체크가 모두 성공했는지 확인
              backend_success=$(echo "$success_checks" | grep -i "backend" | wc -l)
              frontend_success=$(echo "$success_checks" | grep -i "frontend" | wc -l)
              
              echo "Backend 성공 개수: $backend_success, Frontend 성공 개수: $frontend_success"
              
              if [ "$backend_success" -ge 2 ] && [ "$frontend_success" -ge 1 ]; then
                echo "✅ 모든 필수 CI가 성공적으로 완료되었습니다."
                break
              fi
              
              # 아직 진행 중인 체크가 있는지 확인
              running_checks=$(echo "$checks" | jq -r '.[] | select(.status == "IN_PROGRESS" or .status == "QUEUED") | .name' 2>/dev/null || echo "")
              if [ -z "$running_checks" ]; then
                echo "⚠️ 더 이상 진행 중인 CI가 없습니다. 현재 상태로 알림을 보냅니다."
                break
              fi
              
              echo "진행 중인 체크들: $running_checks"
            else
              echo "아직 CI 체크가 시작되지 않았습니다."
            fi
            
            sleep 30
            wait_time=$((wait_time + 30))
          done
          
          if [ $wait_time -ge $max_wait ]; then
            echo "⏰ 최대 대기 시간이 초과되었습니다. 현재 상태로 알림을 보냅니다."
          fi
          
          echo "CI 상태 확인 완료"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Install GitHub CLI
        run: |
          # GitHub CLI가 이미 설치되어 있지만 확인
          gh --version || (sudo apt-get update && sudo apt-get install -y gh)

      - name: Send Fork Slack Notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          pr_title="${{ github.event.pull_request.title }}"
          pr_url="${{ github.event.pull_request.html_url }}"
          pr_author="${{ github.event.pull_request.user.login }}"
          pr_number="${{ github.event.pull_request.number }}"
          
          cat << 'EOF' > slack_message.json
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🔔 Fork PR 리뷰 요청!"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*제목*\n```TITLE_PLACEHOLDER```"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*작성자*\n👤 @AUTHOR_PLACEHOLDER"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*PR 번호*\n<URL_PLACEHOLDER|#NUMBER_PLACEHOLDER>"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*소스*\n🔀 Fork"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*상태*\n✅ CI 완료 후 리뷰 대기"
                  }
                ]
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "리뷰하러 가기 🚀"
                    },
                    "style": "primary",
                    "url": "URL_PLACEHOLDER"
                  }
                ]
              }
            ]
          }
          EOF
          
          # 플레이스홀더 교체 (특수문자 안전 처리)
          # 변수 이스케이프 처리
          escaped_title=$(printf '%s\n' "$pr_title" | sed 's/[[\.*^$()+?{|]/\\&/g')
          escaped_author=$(printf '%s\n' "$pr_author" | sed 's/[[\.*^$()+?{|]/\\&/g')
          escaped_url=$(printf '%s\n' "$pr_url" | sed 's/[[\.*^$()+?{|]/\\&/g')
          
          sed -i "s|TITLE_PLACEHOLDER|$escaped_title|g" slack_message.json
          sed -i "s|AUTHOR_PLACEHOLDER|$escaped_author|g" slack_message.json
          sed -i "s|NUMBER_PLACEHOLDER|$pr_number|g" slack_message.json
          sed -i "s|URL_PLACEHOLDER|$escaped_url|g" slack_message.json
          
          curl -X POST -H 'Content-type: application/json' \
            --data @slack_message.json \
            "$SLACK_WEBHOOK_URL"
          
          echo "Fork PR 알림 전송 완료!"
