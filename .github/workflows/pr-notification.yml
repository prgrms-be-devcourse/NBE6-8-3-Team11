name: PR Notification

on:
  pull_request_target:
    types: [opened, ready_for_review, synchronize, reopened]
    branches:
      - main
      - develop
  # 문제 해결을 위한 push 이벤트도 추가
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
      - 'hotfix/**'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR 번호'
        required: true
        type: string

jobs:
  # 수동 실행용 테스트 Job
  test-manual:
    name: Manual Test Notification
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Send Manual Test Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          cat << 'EOF' > manual_test.json
          {
            "text": "🧪 수동 테스트 성공! PR #${{ inputs.pr_number }} 알림 기능이 작동합니다!"
          }
          EOF
          
          curl -X POST -H 'Content-type: application/json' \
            --data @manual_test.json \
            "$SLACK_WEBHOOK_URL"
          
          echo "수동 테스트 알림 전송 완료!"

  # Push 이벤트로 PR 찾기
  find-pr-and-notify:
    name: Find PR and Notify
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Find PR for this push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 현재 브랜치의 PR 찾기
          pr_number=$(gh pr list --head "${{ github.ref_name }}" --json number -q '.[0].number')
          
          if [ "$pr_number" != "null" ] && [ -n "$pr_number" ]; then
            echo "PR_NUMBER=$pr_number" >> $GITHUB_ENV
            echo "Found PR #$pr_number for branch ${{ github.ref_name }}"
          else
            echo "No PR found for this push, skipping notification"
            exit 0
          fi

      - name: Wait for CI and Send Notification
        if: ${{ env.PR_NUMBER }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          echo "Waiting for CI to complete for PR #${{ env.PR_NUMBER }}..."
          sleep 30
          
          # Slack 알림 전송
          cat << 'EOF' > push_notification.json
          {
            "text": "🔔 PR 업데이트: #${{ env.PR_NUMBER }} 브랜치에 새 커밋이 푸시되었습니다!"
          }
          EOF
          
          curl -X POST -H 'Content-type: application/json' \
            --data @push_notification.json \
            "$SLACK_WEBHOOK_URL"
          
          echo "Push 알림 전송 완료!"

  # CI 작업들이 완료되었는지 확인하는 Job
  wait-for-ci:
    name: Wait for CI Completion
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request_target' && !github.event.pull_request.draft }}
    steps:
      - name: Wait for CI workflows
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: 'Backend - Test'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          allowed-conclusions: success,failure,cancelled,skipped
      
      - name: Wait for Frontend check
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: 'Frontend - Lint & Build'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          allowed-conclusions: success,failure,cancelled,skipped

  # CI 성공 시에만 Slack 알림 전송
  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: wait-for-ci
    if: ${{ github.event_name == 'pull_request_target' && !github.event.pull_request.draft && success() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Install GitHub CLI
        run: sudo apt-get update && sudo apt-get install -y gh

      - name: Check CI Status and Send Slack Notification
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # 현재 PR의 CI 상태 확인
          ci_status=$(gh pr checks $PR_NUMBER --json conclusion -q '.[].conclusion' | sort -u)
          
          # 모든 체크가 성공했는지 확인
          if echo "$ci_status" | grep -v "SUCCESS" | grep -q "."; then
            echo "CI가 아직 진행 중이거나 실패했습니다. 알림을 보내지 않습니다."
            exit 0
          fi
          
          # 리뷰어 목록 가져오기
          reviewers=$(gh pr view $PR_NUMBER --json reviewRequests -q '.reviewRequests[].requestedReviewer.login' 2>/dev/null | tr '\n' ', ' | sed 's/,$//')
          if [ -z "$reviewers" ]; then
            reviewers="리뷰어 미지정"
          fi
          
          # 작성자 정보
          author="${{ github.event.pull_request.user.login }}"
          
          # PR이 fork에서 온 것인지 확인
          is_fork="${{ github.event.pull_request.head.repo.fork }}"
          
          # 리뷰어 포맷팅
          if [ "$reviewers" = "리뷰어 미지정" ]; then
            reviewer_text="👤 리뷰어 미지정"
          else
            reviewer_text="👥 @$reviewers"
          fi
          
          # Fork 정보 포맷팅
          if [ "$is_fork" = "true" ]; then
            fork_badge="🔀 Fork"
          else
            fork_badge="🏠 Main Repo"
          fi
          
          # PR 제목 이스케이프 처리
          title_escaped=$(echo "${{ github.event.pull_request.title }}" | sed 's/"/\\"/g')
          
          # Slack Block Kit 메시지 생성
          cat << 'EOF' > slack_message.json
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🔔 새로운 PR 리뷰 요청"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*제목*\n```TITLE_PLACEHOLDER```"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*작성자*\n👤 @AUTHOR_PLACEHOLDER"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*리뷰어*\nREVIEWER_PLACEHOLDER"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*PR 번호*\n<${{ github.event.pull_request.html_url }}|#PR_NUMBER_PLACEHOLDER>"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*상태*\n✅ CI 테스트 통과"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*소스*\nFORK_PLACEHOLDER"
                }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "리뷰하러 가기 🚀"
                    },
                    "style": "primary",
                    "url": "${{ github.event.pull_request.html_url }}"
                  },
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "변경사항 보기 📝"
                    },
                    "url": "${{ github.event.pull_request.html_url }}/files"
                  }
                ]
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "💡 빠른 리뷰로 팀 개발 속도를 높여보세요!"
                  }
                ]
              }
            ]
          }
          EOF
          
          # 플레이스홀더 교체
          sed -i "s/TITLE_PLACEHOLDER/$title_escaped/g" slack_message.json
          sed -i "s/AUTHOR_PLACEHOLDER/$author/g" slack_message.json
          sed -i "s/REVIEWER_PLACEHOLDER/$reviewer_text/g" slack_message.json
          sed -i "s/PR_NUMBER_PLACEHOLDER/$PR_NUMBER/g" slack_message.json
          sed -i "s/FORK_PLACEHOLDER/$fork_badge/g" slack_message.json
          
          # 슬랙 전송
          curl -X POST -H 'Content-type: application/json' \
            --data @slack_message.json \
            "$SLACK_WEBHOOK_URL"
          
          echo "Slack 알림이 성공적으로 전송되었습니다."

  # CI 실패 시 별도 알림
  notify-failure:
    name: Notify CI Failure
    runs-on: ubuntu-latest
    needs: wait-for-ci
    if: ${{ github.event_name == 'pull_request_target' && !github.event.pull_request.draft && failure() }}
    steps:
      - name: Send Failure Notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"❌ PR CI 테스트 실패: ${{ github.event.pull_request.html_url }}"}' \
            "$SLACK_WEBHOOK_URL"
