name: CD - Deploy to Production

# CD 트리거: main 브랜치에 push될 때만 실행
on:
  push:
    branches:
      - main
  workflow_dispatch: # 수동 실행도 가능

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}/backend
  FRONTEND_IMAGE_NAME: ${{ github.repository }}/frontend

jobs:
  # 1. 보안 및 전처리 검사
  security-scan:
    name: Security & Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Run dependency vulnerability scan
        uses: github/super-linter@v5
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINTER_RULES_PATH: /
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_DOCKERFILE_HADOLINT: true
          VALIDATE_YAML: true

  # 2. 백엔드 빌드 및 도커 이미지 생성
  build-backend:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build backend with Gradle
        working-directory: ./backend
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # 3. 프론트엔드 빌드 및 도커 이미지 생성
  build-frontend:
    name: Build Frontend Docker Image
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies and build
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # 4. GitHub Codespaces에 배포
  deploy-to-codespaces:
    name: Deploy to GitHub Codespaces
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment artifact
        run: |
          mkdir -p deployment
          
          # 배포용 docker-compose 파일 생성
          cat > deployment/docker-compose.prod.yml << 'EOF'
          version: '3.8'
          services:
            mysql:
              image: mysql:8.0
              container_name: petmatching-mysql-prod
              restart: unless-stopped
              environment:
                MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
                MYSQL_DATABASE: ${MYSQL_DATABASE}
                MYSQL_USER: ${MYSQL_USERNAME}
                MYSQL_PASSWORD: ${MYSQL_PASSWORD}
              ports:
                - "3306:3306"
              volumes:
                - mysql_prod_data:/var/lib/mysql
                - ./mysql/init:/docker-entrypoint-initdb.d
              command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
              networks:
                - petmatching-network
              healthcheck:
                test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
                timeout: 10s
                retries: 5
                interval: 30s

            redis:
              image: redis:7-alpine
              container_name: petmatching-redis-prod
              restart: unless-stopped
              ports:
                - "6379:6379"
              volumes:
                - redis_prod_data:/data
              command: redis-server --appendonly yes
              networks:
                - petmatching-network
              healthcheck:
                test: ["CMD", "redis-cli", "ping"]
                timeout: 5s
                retries: 5
                interval: 30s

            backend:
              image: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:latest
              container_name: petmatching-backend-prod
              restart: unless-stopped
              environment:
                SPRING_PROFILES_ACTIVE: production
                MYSQL_HOST: mysql
                MYSQL_PORT: 3306
                MYSQL_DATABASE: ${MYSQL_DATABASE}
                MYSQL_USERNAME: ${MYSQL_USERNAME}
                MYSQL_PASSWORD: ${MYSQL_PASSWORD}
                REDIS_HOST: redis
                REDIS_PORT: 6379
                JWT_SECRET: ${JWT_SECRET}
                JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION}
                JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION}
                KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
                KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
              ports:
                - "8080:8080"
              depends_on:
                mysql:
                  condition: service_healthy
                redis:
                  condition: service_healthy
              networks:
                - petmatching-network
              volumes:
                - ./logs:/app/logs

            frontend:
              image: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
              container_name: petmatching-frontend-prod
              restart: unless-stopped
              environment:
                NODE_ENV: production
                NEXT_PUBLIC_API_URL: http://backend:8080
              ports:
                - "3000:3000"
              depends_on:
                - backend
              networks:
                - petmatching-network

          volumes:
            mysql_prod_data:
            redis_prod_data:

          networks:
            petmatching-network:
              driver: bridge
          EOF

          # 배포 스크립트 생성
          cat > deployment/deploy.sh << 'EOF'
          #!/bin/bash
          
          echo "🚀 PetMatching 프로덕션 배포 시작..."
          
          # 기존 서비스 중지
          echo "🛑 기존 서비스 중지 중..."
          docker-compose -f docker-compose.prod.yml down
          
          # 최신 이미지 pull
          echo "📥 최신 이미지 다운로드 중..."
          docker-compose -f docker-compose.prod.yml pull
          
          # 서비스 시작
          echo "🔄 서비스 시작 중..."
          docker-compose -f docker-compose.prod.yml up -d
          
          # 헬스체크
          echo "🔍 서비스 헬스체크 중..."
          sleep 30
          
          # 백엔드 헬스체크
          backend_health=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health || echo "000")
          if [ "$backend_health" = "200" ]; then
            echo "✅ 백엔드 서비스 정상"
          else
            echo "❌ 백엔드 서비스 오류 (HTTP: $backend_health)"
            exit 1
          fi
          
          # 프론트엔드 헬스체크
          frontend_health=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
          if [ "$frontend_health" = "200" ]; then
            echo "✅ 프론트엔드 서비스 정상"
          else
            echo "❌ 프론트엔드 서비스 오류 (HTTP: $frontend_health)"
            exit 1
          fi
          
          echo "🎉 배포 완료!"
          echo "🔗 서비스 URL:"
          echo "- Frontend: http://localhost:3000"
          echo "- Backend: http://localhost:8080"
          echo "- API Docs: http://localhost:8080/swagger-ui.html"
          EOF

          chmod +x deployment/deploy.sh

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-files
          path: deployment/
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            ## 🚀 배포 완료 - v${{ github.run_number }}
            
            ### 📦 배포된 이미지
            - Backend: `${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:latest`
            - Frontend: `${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:latest`
            
            ### 🔧 배포 방법
            1. Deployment artifacts 다운로드
            2. GitHub Codespaces에서 다음 명령어 실행:
            ```bash
            curl -L -o deployment.zip "${{ github.server_url }}/${{ github.repository }}/suites/${{ github.run_id }}/artifacts/deployment-files"
            unzip deployment.zip
            cd deployment
            ./deploy.sh
            ```
            
            ### 📊 변경사항
            - Commit: ${{ github.sha }}
            - Author: ${{ github.actor }}
            - Branch: ${{ github.ref_name }}
          draft: false
          prerelease: false

  # 5. 배포 완료 알림
  notify-deployment:
    name: Notify Deployment Success
    runs-on: ubuntu-latest
    needs: deploy-to-codespaces
    if: always()
    steps:
      - name: Send Slack Notification
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ "${{ needs.deploy-to-codespaces.result }}" = "success" ]; then
            status="✅ 성공"
            color="good"
            message="프로덕션 배포가 성공적으로 완료되었습니다!"
          else
            status="❌ 실패"
            color="danger"
            message="프로덕션 배포 중 오류가 발생했습니다."
          fi
          
          cat << EOF > slack_message.json
          {
            "attachments": [
              {
                "color": "$color",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "🚀 배포 알림 - PetMatching"
                    }
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*상태*: $status\n*메시지*: $message"
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*커밋*\n\`${{ github.sha }}\`"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*작성자*\n@${{ github.actor }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*브랜치*\n${{ github.ref_name }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*버전*\nv${{ github.run_number }}"
                      }
                    ]
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": {
                          "type": "plain_text",
                          "text": "GitHub Actions 보기"
                        },
                        "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                      },
                      {
                        "type": "button",
                        "text": {
                          "type": "plain_text",
                          "text": "릴리즈 확인"
                        },
                        "url": "${{ github.server_url }}/${{ github.repository }}/releases"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF
          
          curl -X POST -H 'Content-type: application/json' \
            --data @slack_message.json \
            "$SLACK_WEBHOOK_URL"
