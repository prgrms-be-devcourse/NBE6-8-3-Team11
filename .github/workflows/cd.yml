name: CD - Deploy to Fly.io

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend to Fly.io
    runs-on: ubuntu-latest
    if: github.repository == 'prgrms-be-devcourse/NBE6-8-3-Team11'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission to gradlew
        working-directory: ./backend
        run: chmod +x ./gradlew

      - name: Build with Gradle (Java + Kotlin)
        working-directory: ./backend
        run: ./gradlew clean build -x test --no-daemon

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        working-directory: ./backend
        run: flyctl deploy --remote-only --app nbe6-8-3-team11
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  notify-slack:
    name: Notify Deployment Result
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: always() && github.repository == 'prgrms-be-devcourse/NBE6-8-3-Team11'
    
    steps:
      - name: Notify deployment result
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "⚠️ SLACK_WEBHOOK_URL이 설정되지 않았습니다."
            exit 0
          fi
          
          # 배포 결과에 따른 메시지 설정
          if [ "${{ needs.deploy-backend.result }}" == "success" ]; then
            status_emoji="✅"
            status_text="배포 성공"
            color="good"
          else
            status_emoji="❌" 
            status_text="배포 실패"
            color="danger"
          fi
          
          # Slack 메시지 생성
          cat << EOF > slack_message.json
          {
            "attachments": [
              {
                "color": "${color}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "${status_emoji} NBE6-8-3 배포 결과"
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*상태*\n${status_text}"
                      },
                      {
                        "type": "mrkdwn", 
                        "text": "*브랜치*\n\`${{ github.ref_name }}\`"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*배포 URL*\nhttps://nbe6-8-3-team11.fly.dev"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*커밋*\n<https://github.com/prgrms-be-devcourse/NBE6-8-3-Team11/commit/${{ github.sha }}|\`${{ github.sha }}\`>"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF
          
          # Slack으로 메시지 전송
          curl -X POST -H 'Content-type: application/json' \
            --data @slack_message.json \
            "$SLACK_WEBHOOK_URL"
