name: Main CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Frontend Tests
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Run frontend linting
      run: |
        cd frontend
        npm run lint

    - name: Build frontend
      run: |
        cd frontend
        npm run build
      env:
        NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

    # Backend Tests  
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

    - name: Make gradlew executable
      run: |
        cd backend
        chmod +x ./gradlew

    - name: Run backend tests
      run: |
        cd backend
        ./gradlew test

    - name: Build backend
      run: |
        cd backend
        ./gradlew build -x test

  deploy-backend:
    needs: test
    runs-on: ubuntu-latest
    if: success()
    
    steps:
    - name: Deploy Backend to Render
      run: |
        curl -X POST \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{"clearCache": false}' \
          "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys"

    - name: Wait for backend deployment
      run: |
        echo "Waiting for Render deployment to complete..."
        sleep 90

    - name: Backend health check
      run: |
        curl -f ${{ secrets.BACKEND_URL }}/health || exit 1

  push-to-fork:
    needs: test
    runs-on: ubuntu-latest
    if: success()
    
    steps:
    - name: Checkout organization repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.FORK_PUSH_TOKEN }}

    - name: Configure git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

    - name: Push to personal fork
      run: |
        # Fork 저장소를 remote로 추가
        git remote add fork https://${{ secrets.FORK_PUSH_TOKEN }}@github.com/loseminho/NBE6-8-2-Team11.git
        
        # 현재 브랜치 확인
        CURRENT_BRANCH=${GITHUB_REF#refs/heads/}
        echo "Current branch: $CURRENT_BRANCH"
        
        # Fork로 푸시 (강제 푸시로 동기화)
        git push fork $CURRENT_BRANCH:$CURRENT_BRANCH --force
        
        echo "✅ Successfully pushed $CURRENT_BRANCH to fork"

  notify:
    needs: [deploy-backend, push-to-fork]
    runs-on: ubuntu-latest
    if: success()
    
    steps:
    - name: Notify deployment success
      run: |
        echo "🎉 Full deployment pipeline completed successfully!"
        echo "✅ Backend deployed to Render"
        echo "✅ Code pushed to fork"
        echo "🚀 Vercel will automatically deploy frontend from fork"
