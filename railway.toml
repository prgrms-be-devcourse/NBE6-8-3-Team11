[build]
builder = "nixpacks"
buildCommand = "cd backend && chmod +x gradlew && ./gradlew build -x test"

[deploy]
startCommand = "cd backend && java -Dspring.profiles.active=railway -jar build/libs/*.jar"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[env]
# 환경 변수는 Railway 대시보드에서 설정
# SPRING_PROFILES_ACTIVE = "railway"
# PORT = "8080"
