services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: petmatching-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-petmatching}
      MYSQL_USER: ${MYSQL_USERNAME:-petmatching_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - petmatching-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      timeout: 10s
      retries: 5
      interval: 30s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: petmatching-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - petmatching-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5
      interval: 30s

  # Backend Spring Boot Application
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: petmatching-backend
    restart: unless-stopped
    environment:
      # Spring profiles
      SPRING_PROFILES_ACTIVE: docker
      
      # Database configuration
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-petmatching}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-petmatching_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
      
      # Redis configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # JWT configuration
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-minimum-256-bits-long}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-PT15M}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-PT168H}
      
      # OAuth configuration
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-27f36d6e010908844fbe8b200a8e25d8}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-your-kakao-secret}
      OAUTH2_REDIRECT_URI: ${OAUTH2_REDIRECT_URI:-http://localhost:8080/login/oauth2/code/kakao}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - petmatching-network
    volumes:
      - ./backend/logs:/app/logs

  # Frontend Next.js Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: petmatching-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - petmatching-network

  # Redis Commander (Optional - for Redis management)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: petmatching-redis-commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - petmatching-network
    profiles:
      - tools

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  petmatching-network:
    driver: bridge